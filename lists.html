---
layout: default
---

<article class="post-grid">
  <header class="page-header">
    <h1 class="page-header__title">Lists</h1>
  </header>

  <p class="page-intro">Curated lists, revealed on click. Albums, films, games, and coffees worth remembering.</p>

  <div class="list-reveals">
    {% assign list_posts = site.posts | where: "type", "lists" %}
    {% for post in list_posts %}
      <a class="list-reveal" href="{{ site.baseurl }}{{ post.url }}">
        <span class="list-reveal__title">{{ post.title }}</span>
        <span class="list-reveal__cta">Reveal →</span>
      </a>
    {% endfor %}
  </div>
</article>
